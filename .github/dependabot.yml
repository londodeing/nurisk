version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "@nurisk/backend-team"
      - "@nurisk/frontend-team"
    assignees:
      - "@nurisk/devops-team"
    labels:
      - "dependencies"
      - "weekly-update"