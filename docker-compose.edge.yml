version: '3.8'

services:
  # Edge PostgreSQL Database
  postgres:
    image: postgis/postgis:15-3.3
    container_name: nurisk-edge-postgres
    environment:
      POSTGRES_DB: nurisk
      POSTGRES_USER: nurisk
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nurisk123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurisk"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Edge Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nurisk-edge-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Edge API Server
  edge-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: nurisk-edge-api
    environment:
      NODE_ENV: edge
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nurisk
      DB_USER: nurisk
      DB_PASSWORD: ${DB_PASSWORD:-nurisk123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLOUD_ENDPOINT: ${CLOUD_ENDPOINT:-https://api.nurisk.id}
      EDGE_NODE_ID: ${EDGE_NODE_ID:-edge-001}
      EDGE_REGION: ${EDGE_REGION:-default}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/uploads

  # Health Monitor
  health-monitor:
    image: alpine:latest
    container_name: nurisk-edge-health
    command: >
      sh -c "apk add --no-cache curl && 
            while true; do 
              sleep 60; 
              curl -f http://edge-api:3000/health || echo 'EDGE API DOWN';
            done"
    depends_on:
      - edge-api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: nurisk-edge