services:
  traefik:
    image: traefik:v3.1
    container_name: nurisk-traefik-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@nurisk.io}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - traefik_letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${STAGING_DOMAIN:-staging.nurisk.io}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - nurisk-network

  postgres:
    image: timescale/timescaledb:2.15.0-pg16
    container_name: nurisk-postgres-staging
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nurisk_staging
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - nurisk-network

  redis:
    image: redis:7-alpine
    container_name: nurisk-redis-staging
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data_staging:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - nurisk-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nurisk/backend:staging
    container_name: nurisk-backend-staging
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: nurisk_staging
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_URL: redis://redis:6379
      PORT: 3000
      LOG_LEVEL: debug
      CORS_ORIGIN: https://app.${STAGING_DOMAIN:-staging.nurisk.io}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.${STAGING_DOMAIN:-staging.nurisk.io}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
      - "traefik.http.routers.backend.middlewares=rate-limit"
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - nurisk-network

  neo4j:
    image: neo4j:5
    container_name: nurisk-neo4j-staging
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_dbms_memory_pagecache_size: ${NEO4J_PAGECACHE:-512M}
      NEO4J_dbms_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512M}
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
    volumes:
      - neo4j_data_staging:/data
      - neo4j_logs_staging:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    networks:
      - nurisk-network

  frontend-web:
    build:
      context: .
      dockerfile: frontend-web/Dockerfile
    image: nurisk/frontend-web:staging
    container_name: nurisk-frontend-web-staging
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VITE_API_BASE_URL: https://api.${STAGING_DOMAIN:-staging.nurisk.io}
      VITE_WS_URL: wss://api.${STAGING_DOMAIN:-staging.nurisk.io}
      NODE_ENV: production
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-web.rule=Host(`app.${STAGING_DOMAIN:-staging.nurisk.io}`)"
      - "traefik.http.routers.frontend-web.entrypoints=websecure"
      - "traefik.http.routers.frontend-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend-web.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - nurisk-network

volumes:
  postgres_data_staging:
  redis_data_staging:
  neo4j_data_staging:
  neo4j_logs_staging:
  traefik_letsencrypt:

networks:
  nurisk-network:
    external: true
