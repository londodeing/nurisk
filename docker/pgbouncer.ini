[databases]
nurisk = host=postgres port=5432 dbname=nurisk

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_db_connections = 50
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
max_client_conn = 200
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
admin_users = nurisk
stats_users = nurisk