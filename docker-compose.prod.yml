services:
  traefik:
    image: traefik:v3.1
    container_name: nurisk-traefik-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@nurisk.io}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--accesslog=true"
      - "--log.level=INFO"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - traefik_letsencrypt:/letsencrypt
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - nurisk-prod

  postgres:
    image: postgis/postgis:16-3.4
    container_name: nurisk-postgres-prod
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nurisk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    networks:
      - nurisk-prod

  redis:
    image: redis:7-alpine
    container_name: nurisk-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - nurisk-prod

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nurisk/backend:${IMAGE_TAG:-latest}
    container_name: nurisk-backend-prod
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-nurisk}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_URL: redis://redis:6379
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: https://${PRODUCTION_DOMAIN:-nurisk.io}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.${PRODUCTION_DOMAIN:-nurisk.io}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
      - "traefik.http.routers.backend.middlewares=rate-limit,cors"
      - "traefik.http.middlewares.rate-limit.ratelimit.average=200"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=100"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=https://${PRODUCTION_DOMAIN:-nurisk.io}"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=Authorization,Content-Type"
    deploy:
      mode: replicated
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - nurisk-prod

  neo4j:
    image: neo4j:5
    container_name: nurisk-neo4j-prod
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_dbms_memory_pagecache_size: ${NEO4J_PAGECACHE:-1G}
      NEO4J_dbms_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-1G}
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_MAX:-4G}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 6G
        reservations:
          cpus: "1"
          memory: 2G
    networks:
      - nurisk-prod

  frontend-web:
    build:
      context: .
      dockerfile: frontend-web/Dockerfile
    image: nurisk/frontend-web:${IMAGE_TAG:-latest}
    container_name: nurisk-frontend-web-prod
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VITE_API_BASE_URL: https://api.${PRODUCTION_DOMAIN:-nurisk.io}
      VITE_WS_URL: wss://api.${PRODUCTION_DOMAIN:-nurisk.io}
      NODE_ENV: production
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-web.rule=Host(`${PRODUCTION_DOMAIN:-nurisk.io}`)"
      - "traefik.http.routers.frontend-web.entrypoints=websecure"
      - "traefik.http.routers.frontend-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend-web.loadbalancer.server.port=80"
    deploy:
      mode: replicated
      replicas: ${FRONTEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
      update_config:
        parallelism: 2
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 60s
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - nurisk-prod

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  traefik_letsencrypt:

networks:
  nurisk-prod:
    driver: overlay
    attachable: true
