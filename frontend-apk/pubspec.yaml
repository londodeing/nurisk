name: nurisk_mobile
description: NURisk Mobile - Disaster Management App for Central Java
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  # Network
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3
  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  # Image
  image_picker: ^1.0.7
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  connectivity_plus: ^6.0.0
  # Voice
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  # OpenAPI code generation
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/